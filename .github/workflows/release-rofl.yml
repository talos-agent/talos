name: release-rofl

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release-rofl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO: Move this to dedicated GitHub Action for CLI install.
      - name: Install Oasis CLI
        env:
          CLI_VERSION: 0.14.3
        run: |
          mkdir -p /tmp/oasis-cli
          cd /tmp/oasis-cli
          wget "https://github.com/oasisprotocol/cli/releases/download/v${CLI_VERSION}/oasis_cli_${CLI_VERSION}_linux_amd64.tar.gz" -O cli.tar.gz
          tar --strip-components 1 -xf cli.tar.gz
          echo "/tmp/oasis-cli" >> ${GITHUB_PATH}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Talos Docker image
        env:
          TARGET_IMAGE: ghcr.io/kostko/talos:latest-agent
        run: ./scripts/build_container_image.sh

      # TODO: Verify that the image digest matches what is in the manifest.

      - name: Build ROFL ORC for deployment, verify it matches the manifest
        env:
          DEPLOYMENT: testnet
        run: oasis rofl build --deployment ${DEPLOYMENT} --offline --verify

      - name: Push ROFL ORC to OCI repository
        env:
          DEPLOYMENT: testnet
        run: oasis rofl push --deployment ${DEPLOYMENT} --format json
        # TODO: Parse OCI reference from output.

      # TODO: Generate transaction proposal and queue to multisig for execution.

