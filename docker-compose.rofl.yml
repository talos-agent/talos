services:
  talos-agent:
    build: .
    # NOTE: Run ./scripts/build_container_image.sh to retrieve the digest.
    image: ghcr.io/kostko/talos:latest-agent@sha256:cd925141a002c09b3bdde871981cba5a197c662e80663ca859984922721d0c7a
    container_name: talos-agent
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - PINATA_API_KEY=${PINATA_API_KEY}
      - PINATA_SECRET_API_KEY=${PINATA_SECRET_API_KEY}
    volumes:
      - talos_data:/app/data
    ports:
      - "8000:8000"

volumes:
  talos_data:
